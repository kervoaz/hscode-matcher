# Enable with: mvn spring-boot:run -Pdev   (recommended on PowerShell)
# Or quote the property: mvn spring-boot:run "-Dspring-boot.run.profiles=dev"

logging.level.com.geodis.hs.matcher.classify.LuceneChapterClassifier=DEBUG
logging.level.com.geodis.hs.matcher.llm.LlmChapterRefinementService=DEBUG
logging.level.com.geodis.hs.matcher.embed.EmbeddingHttpClient=DEBUG
logging.level.com.geodis.hs.matcher.bulk.persistence.BulkChapterPersistenceService=DEBUG

# Export CSVs to repository root first (see application.properties comment).
nomenclature.csv.en=../nomenclature-en.csv
nomenclature.csv.fr=../nomenclature-fr.csv
nomenclature.csv.de=../nomenclature-de.csv

# Bulk classify: write result files next to REST samples (from hscode-matcher-api cwd)
bulk.chapter-classify.output-dir=../rest-client/out

# Optional: Ollama (OpenAI-compatible). Set OPENAI_API_KEY or bulk.llm.api-key for cloud models.
bulk.llm.enabled=true
bulk.llm.base-url=http://127.0.0.1:11434
bulk.llm.model=mistral
bulk.llm.chat-path=/v1/chat/completions
# Large CSV: avoid one LLM call per row (can take hours). Set false only for small batches.
bulk.llm.only-when-ambiguous=true

# Optional: same Ollama host for /api/embeddings (pull e.g. nomic-embed-text). Fuses with Lucene for LLM shortlist.
bulk.embedding.enabled=true
bulk.embedding.model=nomic-embed-text
bulk.embedding.style=ollama
bulk.embedding.base-url=http://127.0.0.1:11434

# Optional: persist bulk runs to Postgres (Supabase JDBC): bulk.persistence.enabled=true + url/username/password
