spring.application.name=hscode-matcher-api

# JDBC + Flyway default auto-config are excluded on Application; optional bulk DB when bulk.persistence.enabled=true.

# Optional: persist bulk chapter-classify runs to Postgres (Supabase JDBC URL). Flyway runs migrations on startup when enabled.
bulk.persistence.enabled=false
bulk.persistence.url=
bulk.persistence.username=
bulk.persistence.password=
bulk.persistence.batch-size=100

# Bulk CSV upload (chapter-classify)
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=32MB

# If set, bulk chapter-classify also writes results under this directory (absolute or relative to JVM cwd):
# chapter-classify-<runId>.csv (multipart) and chapter-classify-<runId>.json (JSON). HTTP body unchanged.
bulk.chapter-classify.output-dir=

# Bulk chapter LLM refinement (OpenAI-compatible POST {baseUrl}{chatPath}, e.g. /v1/chat/completions). Off by default.
bulk.llm.enabled=false
bulk.llm.base-url=https://api.openai.com
bulk.llm.api-key=
bulk.llm.model=gpt-4o-mini
bulk.llm.chat-path=/v1/chat/completions
bulk.llm.connect-timeout-seconds=15
bulk.llm.read-timeout-seconds=120
bulk.llm.only-when-ambiguous=false
bulk.llm.max-output-tokens=350
bulk.llm.temperature=0.15
bulk.llm.max-description-chars=1200

# Optional: chapter-level embeddings (Ollama /api/embeddings or OpenAI /v1/embeddings) fused with Lucene for LLM shortlist.
bulk.embedding.enabled=false
bulk.embedding.eager-init=false
bulk.embedding.base-url=http://127.0.0.1:11434
bulk.embedding.api-key=
bulk.embedding.model=nomic-embed-text
bulk.embedding.style=ollama
bulk.embedding.connect-timeout-seconds=15
bulk.embedding.read-timeout-seconds=120
bulk.embedding.rrf-k=30
bulk.embedding.semantic-pool=10
bulk.embedding.refinement-candidate-count=5
bulk.embedding.lexical-rank-pool=10
bulk.embedding.query-cache-max-size=50000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# UTF-8 CSV only. Use classpath: for files under src/main/resources (embedded in the JAR).
# Override with absolute paths or Azure App Settings when you externalize data again.
# Export from XLSX: mvn exec:java (see CLAUDE.md). DE: add nomenclature-de.csv under resources/nomenclature/ then set classpath below.
nomenclature.csv.en=classpath:nomenclature/nomenclature-en.csv
nomenclature.csv.fr=classpath:nomenclature/nomenclature-fr.csv
nomenclature.csv.de=

# Lexical search ranking: boost deeper HS lines (indexed text = ancestors + node); soften PARENT_CONTEXT.
nomenclature.search.ranking.lexical-depth-boost-per-tier=0.06
nomenclature.search.ranking.parent-context-score-factor=0.88
nomenclature.search.ranking.overfetch-factor=5
nomenclature.search.ranking.overfetch-max=200

# Optional: require X-Reload-Token header for POST /api/v1/admin/reload (leave blank to allow reload without token in dev only)
nomenclature.admin.reload-token=
