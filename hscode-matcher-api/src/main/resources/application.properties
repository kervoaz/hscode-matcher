spring.application.name=hscode-matcher-api
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never

# UTF-8 CSV paths (export: mvn -q exec:java -Dexec.in=../NomenclatureEN.XLSX -Dexec.out=../nomenclature-en.csv)
# Leave blank to skip loading (search returns 503 until configured).
nomenclature.csv.en=NomenclatureEN.XLSX
nomenclature.csv.fr=NomenclatureFR.XLSX
nomenclature.csv.de=NomenclatureDE.XLSX

# Optional: require X-Reload-Token header for POST /api/v1/admin/reload (leave blank to allow reload without token in dev only)
nomenclature.admin.reload-token=

# Phase 3b: ONNX embeddings (off by default — set enabled=true and a readable model-path to load semantic index at startup later)
hs.matcher.onnx.enabled=true
hs.matcher.onnx.model-path=classpath:onnx/model_qint8_avx512.onnx

# Phase 4: RRF hybrid (used when ONNX is enabled and embedding indexes built with the bundle)
hs.matcher.hybrid.rrf-k=60
hs.matcher.hybrid.lexical-pool-multiplier=8
# Server-side: skip hybrid until query length >= N (0 = off). Overridable per request: minHybridChars.
hs.matcher.hybrid.min-query-chars=0
# Default embedding timeout per search (0 = no timeout). Overridable: embedTimeoutMs.
hs.matcher.embed.timeout-ms=0

# Optional: persist embedding matrices to skip ONNX re-encode on startup when CSV unchanged (mtime + size + row count + salt)
# Relative path → résolu depuis le répertoire courant du JVM (user.dir), ex. ./tmp si vous lancez depuis hscode-matcher-api/.
hs.matcher.embedding.cache-dir=tmp
hs.matcher.embedding.cache-salt=1
