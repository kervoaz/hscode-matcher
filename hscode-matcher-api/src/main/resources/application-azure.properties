# Profil "azure" — activer avec SPRING_PROFILES_ACTIVE=azure (App Service, ACI, AKS, etc.)
# Les chemins CSV / ONNX / cache restent à fournir via variables d'environnement (voir DEPLOY-AZURE.md).

# App Service et la plupart des runtimes injectent PORT.
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Probes HTTP pour orchestrateurs / plateformes (liveness/readiness sous /actuator/health)
management.endpoint.health.probes.enabled=true
